<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg-page); color: var(--text-body); font-family: var(--font-body); }
  ::selection { background: var(--accent-soft); }

  /* Entrance animation — base state is visible; animation runs only once a
     mounted ancestor gets [data-reveal], so a non-painting render never blanks. */
  @keyframes emberRise { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }
  @keyframes emberFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes emberZoom { from { transform: scale(1.08); } to { transform: scale(1); } }
  [data-reveal] .ember-rise { animation: emberRise 0.7s cubic-bezier(0.22,0.61,0.36,1) both; }
  [data-reveal] .ember-fade { animation: emberFade 1.1s ease both; }
  [data-reveal] .ember-zoom { animation: emberZoom 1.6s cubic-bezier(0.22,0.61,0.36,1) both; }
  @media (prefers-reduced-motion: reduce) {
    [data-reveal] .ember-rise, [data-reveal] .ember-fade, [data-reveal] .ember-zoom { animation: none; }
  }

  /* Hover lift micro-interaction */
  .lift { transition: transform 0.2s var(--ease-out, ease), border-color 0.2s, box-shadow 0.2s; }
  .lift:hover { transform: translateY(-3px); border-color: var(--line-gold); box-shadow: var(--shadow-md); }
  @media (prefers-reduced-motion: reduce) { .lift:hover { transform: none; } }
</style>
