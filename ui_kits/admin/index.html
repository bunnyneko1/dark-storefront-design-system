<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ember Tobacco Co. — Inventory Back-office</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg-void); color: var(--text-body); font-family: var(--font-body); }
  ::selection { background: var(--accent-soft); }
  button { font-family: inherit; }

  /* Themed scrollbar to match the dark + gold palette */
  .ember-scroll { scrollbar-width: thin; scrollbar-color: var(--line-gold) transparent; }
  .ember-scroll::-webkit-scrollbar { width: 9px; height: 9px; }
  .ember-scroll::-webkit-scrollbar-track { background: transparent; }
  .ember-scroll::-webkit-scrollbar-thumb { background: var(--line-gold); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
  .ember-scroll::-webkit-scrollbar-thumb:hover { background: var(--gold-300); background-clip: padding-box; }

  /* Slide-over panel motion */
  @keyframes panelIn { from { transform: translateX(24px); opacity: 0; } to { transform: none; opacity: 1; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes rowFlash { from { background: var(--accent-soft); } to { background: transparent; } }
  .panel-in { animation: panelIn 0.26s cubic-bezier(0.22,0.61,0.36,1); }
  .fade-in { animation: none; }
  .row-flash { animation: rowFlash 1s ease; }
  @media (prefers-reduced-motion: reduce) { .panel-in, .fade-in, .row-flash { animation: none; } }

  tr.inv-row { transition: background 0.14s; }
  tr.inv-row:hover { background: var(--surface-raised); }
</style>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
  function Mount() {
    const ready = ['AdminApp','Sidebar','Topbar','Dashboard','Inventory','AdjustPanel','Receive','Activity'].every(n => window[n]);
    if (!ready || !window.Icon || !window.AdminUI || !window.EmberTobaccoCoDesignSystem_3a8c24 || !window.EMBER_INVENTORY) { setTimeout(Mount, 40); return; }
    ReactDOM.createRoot(document.getElementById('root')).render(<AdminApp />);
    setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
  }
  Mount();
</script>
