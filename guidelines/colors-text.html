<!-- @dsCard group="Colors" viewport="700x150" name="Text on Dark" subtitle="Cream / parchment text ramp + roles" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); font-family: var(--font-body); padding: 24px; display: flex; gap: 34px; align-items: flex-start; }
  .item { display: flex; flex-direction: column; gap: 3px; }
  .demo { font-family: var(--font-display); font-size: 26px; font-weight: 500; }
  .role { font-family: var(--font-label); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--cream-500); }
</style>
</head>
<body>
  <div class="item"><span class="demo" style="color:var(--text-strong)">Aa</span><span class="role">Strong</span><span class="hex">#F6F1E7</span></div>
  <div class="item"><span class="demo" style="color:var(--text-body)">Aa</span><span class="role">Body</span><span class="hex">#D9D0BF</span></div>
  <div class="item"><span class="demo" style="color:var(--text-muted)">Aa</span><span class="role">Muted</span><span class="hex">#948A77</span></div>
  <div class="item"><span class="demo" style="color:var(--text-faint)">Aa</span><span class="role">Faint</span><span class="hex">#6E6555</span></div>
  <div class="item"><span class="demo" style="color:var(--text-accent)">Aa</span><span class="role">Accent</span><span class="hex">#CDA85B</span></div>
</body>
</html>
