<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); font-family: var(--font-body); padding: 24px; display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .bar { background: var(--gold-400); border-radius: 1px; width: 18px; }
  .v { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .t { font-family: var(--font-label); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="col"><span class="bar" style="height:4px"></span><span class="v">4</span><span class="t">1</span></div>
  <div class="col"><span class="bar" style="height:8px"></span><span class="v">8</span><span class="t">2</span></div>
  <div class="col"><span class="bar" style="height:12px"></span><span class="v">12</span><span class="t">3</span></div>
  <div class="col"><span class="bar" style="height:16px"></span><span class="v">16</span><span class="t">4</span></div>
  <div class="col"><span class="bar" style="height:24px"></span><span class="v">24</span><span class="t">5</span></div>
  <div class="col"><span class="bar" style="height:32px"></span><span class="v">32</span><span class="t">6</span></div>
  <div class="col"><span class="bar" style="height:40px"></span><span class="v">40</span><span class="t">7</span></div>
  <div class="col"><span class="bar" style="height:48px"></span><span class="v">48</span><span class="t">8</span></div>
  <div class="col"><span class="bar" style="height:64px"></span><span class="v">64</span><span class="t">9</span></div>
  <div class="col"><span class="bar" style="height:80px"></span><span class="v">80</span><span class="t">10</span></div>
</body>
</html>
