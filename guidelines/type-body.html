<!-- @dsCard group="Type" viewport="700x230" name="Body — Hanken Grotesk" subtitle="UI & paragraph text, four sizes" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); font-family: var(--font-body); padding: 24px; color: var(--text-body); }
  .line { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px solid var(--line); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); width: 92px; flex: none; }
  .b-lg { font-size: 22px; font-weight: 500; color: var(--text-strong); }
  .b-md { font-size: 18px; font-weight: 400; }
  .b-base { font-size: 16px; font-weight: 400; }
  .b-sm { font-size: 14px; font-weight: 400; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="line"><span class="meta">22 / 500</span><span class="b-lg">Australia&rsquo;s licensed tobacconist.</span></div>
  <div class="line"><span class="meta">18 / 400</span><span class="b-md">Every order is age-verified before dispatch.</span></div>
  <div class="line"><span class="meta">16 / 400</span><span class="b-base">Browse cigarettes, cigars, and rolling tobacco from a curated range of trusted brands, delivered discreetly Australia-wide.</span></div>
  <div class="line" style="border:none"><span class="meta">14 / 400</span><span class="b-sm">Prices include GST. You must be 18 or over to purchase.</span></div>
</body>
</html>
