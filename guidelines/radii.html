<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="Near-sharp corners — restrained luxury" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); font-family: var(--font-body); padding: 24px; display: flex; gap: 22px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 9px; }
  .box { width: 76px; height: 60px; background: var(--surface-raised); border: 1px solid var(--line-gold); }
  .v { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .t { font-family: var(--font-label); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="col"><span class="box" style="border-radius:var(--radius-xs)"></span><span class="v">2px</span><span class="t">xs</span></div>
  <div class="col"><span class="box" style="border-radius:var(--radius-sm)"></span><span class="v">3px</span><span class="t">sm</span></div>
  <div class="col"><span class="box" style="border-radius:var(--radius-md)"></span><span class="v">5px</span><span class="t">md</span></div>
  <div class="col"><span class="box" style="border-radius:var(--radius-lg)"></span><span class="v">8px</span><span class="t">lg</span></div>
  <div class="col"><span class="box" style="border-radius:var(--radius-xl)"></span><span class="v">12px</span><span class="t">xl</span></div>
  <div class="col"><span class="box" style="border-radius:var(--radius-pill); width:60px"></span><span class="v">pill</span><span class="t">999</span></div>
</body>
</html>
