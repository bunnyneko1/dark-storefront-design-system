<!-- @dsCard group="Colors" viewport="700x180" name="Brand — Brass & Ember" subtitle="Gold accent ramp + oxblood ember secondary" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); font-family: var(--font-body); padding: 22px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .sw { width: 96px; height: 86px; border-radius: var(--radius-sm); border: 1px solid var(--line); display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; box-sizing: border-box; }
  .name { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.92); letter-spacing: 0.02em; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,0.7); margin-top: 1px; }
  .lbl { font-family: var(--font-label); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 9px; }
</style>
</head>
<body>
  <p class="lbl">Brass / Gold</p>
  <div class="row">
    <div class="sw" style="background:var(--gold-200)"><span class="name" style="color:#1a1714">200</span><span class="hex" style="color:#3a332a">#F0DCA6</span></div>
    <div class="sw" style="background:var(--gold-300)"><span class="name" style="color:#1a1714">300</span><span class="hex" style="color:#3a332a">#E3C77E</span></div>
    <div class="sw" style="background:var(--gold-400)"><span class="name" style="color:#1a1714">400 · accent</span><span class="hex" style="color:#3a332a">#CDA85B</span></div>
    <div class="sw" style="background:var(--gold-500)"><span class="name">500</span><span class="hex">#B8893D</span></div>
    <div class="sw" style="background:var(--gold-600)"><span class="name">600</span><span class="hex">#997230</span></div>
    <div class="sw" style="background:var(--gold-700)"><span class="name">700</span><span class="hex">#6E5223</span></div>
  </div>
  <p class="lbl" style="margin-top:16px">Oxblood Ember</p>
  <div class="row">
    <div class="sw" style="background:var(--ember-300)"><span class="name">300</span><span class="hex">#C9543F</span></div>
    <div class="sw" style="background:var(--ember-400)"><span class="name">400</span><span class="hex">#A63B2B</span></div>
    <div class="sw" style="background:var(--ember-500)"><span class="name">500 · secondary</span><span class="hex">#8C2F22</span></div>
    <div class="sw" style="background:var(--ember-600)"><span class="name">600</span><span class="hex">#6B241A</span></div>
  </div>
</body>
</html>
