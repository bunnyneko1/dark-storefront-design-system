<!-- @dsCard group="Type" viewport="700x220" name="Display — Bodoni Moda" subtitle="Didone display for headings & product names" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); font-family: var(--font-display); padding: 24px; color: var(--text-strong); }
  .line { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--line); padding: 10px 0; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); width: 92px; flex: none; }
  .d1 { font-size: 52px; font-weight: 600; letter-spacing: -0.02em; line-height: 1; }
  .d2 { font-size: 34px; font-weight: 500; letter-spacing: -0.015em; }
  .d3 { font-size: 22px; font-weight: 500; }
  .d4 { font-size: 18px; font-weight: 500; font-style: italic; }
</style>
</head>
<body>
  <div class="line"><span class="meta">88 / 600</span><span class="d1">Ember &amp; Oak</span></div>
  <div class="line"><span class="meta">36 / 500</span><span class="d2">Dunhill Fine Cut</span></div>
  <div class="line"><span class="meta">22 / 500</span><span class="d3">Robusto Tubo, single cigar</span></div>
  <div class="line" style="border:none"><span class="meta">18 / 500 it</span><span class="d4">Aged in cedar, est. 1962</span></div>
</body>
</html>
