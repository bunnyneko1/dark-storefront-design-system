<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Warm Charcoal" subtitle="The smoke ramp: page, surfaces, borders" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); font-family: var(--font-body); padding: 22px; }
  .row { display: flex; gap: 0; border: 1px solid var(--line); border-radius: var(--radius-sm); overflow: hidden; }
  .sw { flex: 1; height: 92px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; box-sizing: border-box; }
  .name { font-size: 11px; font-weight: 600; color: var(--cream-200); }
  .hex { font-family: var(--font-mono); font-size: 9.5px; color: var(--cream-400); margin-top: 1px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--ink-950)"><span class="name">950</span><span class="hex">#0A0908</span></div>
    <div class="sw" style="background:var(--ink-900)"><span class="name">900 · page</span><span class="hex">#0E0C0B</span></div>
    <div class="sw" style="background:var(--ink-800)"><span class="name">800 · card</span><span class="hex">#1A1714</span></div>
    <div class="sw" style="background:var(--ink-700)"><span class="name">700 · raised</span><span class="hex">#221E1A</span></div>
    <div class="sw" style="background:var(--ink-600)"><span class="name">600</span><span class="hex">#2C2620</span></div>
    <div class="sw" style="background:var(--ink-500)"><span class="name">500 · border</span><span class="hex">#3A332A</span></div>
    <div class="sw" style="background:var(--ink-400)"><span class="name">400</span><span class="hex">#4E4538</span></div>
    <div class="sw" style="background:var(--ink-300)"><span class="name">300</span><span class="hex">#6B6053</span></div>
  </div>
</body>
</html>
