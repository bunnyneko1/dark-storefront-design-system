<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); font-family: var(--font-body); padding: 26px; }
  .row { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
  .col { flex: 1; min-width: 220px; }
  .lbl { font-family: var(--font-label); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 12px; }
  .stepwrap { display: flex; gap: 24px; align-items: center; margin-top: 18px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, QuantityStepper } = window.EmberTobaccoCoDesignSystem_3a8c24;
  function Demo(){
    const [qty, setQty] = React.useState(2);
    return (<div>
      <div className="row">
        <div className="col"><Input label="Email" type="email" placeholder="you@example.com" hint="For order confirmation" /></div>
        <div className="col"><Input label="Date of birth" placeholder="DD / MM / YYYY" /></div>
        <div className="col"><Input label="Promo code" defaultValue="EMBER" error="Code expired" /></div>
      </div>
      <div className="stepwrap">
        <p className="lbl" style={{margin:0}}>Quantity</p>
        <QuantityStepper value={qty} min={1} max={10} onChange={setQty} />
        <QuantityStepper size="sm" value={1} min={1} max={5} onChange={()=>{}} />
      </div>
    </div>);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
